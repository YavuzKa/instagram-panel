<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Veri Çekici Panel</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .panel {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 700px;
            padding: 40px;
            transition: all 0.3s ease;
        }
        h1 { text-align: center; color: #333; margin-bottom: 30px; font-weight: 600; font-size: 28px; }
        .password-section, .main-section { transition: all 0.3s ease; }
        .hidden { display: none !important; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: #555; font-size: 14px; }
        input[type="password"], input[type="text"] {
            width: 100%; padding: 15px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px;
            transition: border-color 0.3s ease;
        }
        input:focus { outline: none; border-color: #667eea; }
        button {
            width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .error-message { color: #e74c3c; font-size: 14px; margin-top: 10px; text-align: center; background: #fdeaea; padding: 10px; border-radius: 8px; }
        .success-message { color: #27ae60; font-size: 14px; margin-top: 10px; text-align: center; background: #e8f8f5; padding: 10px; border-radius: 8px; }
        .loading { text-align: center; margin: 20px 0; color: #667eea; font-weight: 500; }
        .spinner {
            border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%;
            width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 10px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .result-area { margin-top: 30px; background: #f8f9fa; border-radius: 10px; padding: 20px; }
        textarea {
            width: 100%; height: 300px; padding: 15px; border: 2px solid #e0e0e0; border-radius: 10px;
            font-family: 'Courier New', monospace; font-size: 14px; resize: vertical; background: white;
        }
        .copy-btn { margin-top: 10px; background: #27ae60; background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%); }
        .copy-btn:hover { box-shadow: 0 10px 20px rgba(46, 204, 113, 0.4); }
        .warning {
            background: #fff3cd; color: #856404; padding: 15px; border-radius: 10px; margin-bottom: 20px;
            font-size: 14px; border: 1px solid #ffeeba;
        }
    </style>
</head>
<body>
    <div class="panel">
        <div id="passwordSection" class="password-section">
            <h1>🔒 Yetkili Girişi</h1>
            <div class="input-group">
                <label for="password">Şifre</label>
                <input type="password" id="password" placeholder="Şifrenizi giriniz" autofocus>
            </div>
            <button id="loginBtn">Giriş Yap</button>
            <div id="passwordError" class="error-message hidden"></div>
        </div>

        <div id="mainSection" class="main-section hidden">
            <h1>📸 Instagram Veri Çekici</h1>
            
            <div class="warning">
                <strong>⚠️ Bilgi</strong>
                Hesap herkese açık olmalıdır. Gizli hesaplardan veri alınamaz.
            </div>

            <div class="input-group">
                <label for="username">Instagram Kullanıcı Adı</label>
                <input type="text" id="username" placeholder="Örn: ornek_hesap" required>
            </div>
            <button id="fetchBtn">Verileri Çek & Prompt Oluştur</button>
            
            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                Veriler çekiliyor, lütfen bekleyin...
            </div>
            
            <div id="message" class="error-message hidden"></div>
            
            <div id="resultSection" class="result-area hidden">
                <label for="promptOutput">Claude için Prompt</label>
                <textarea id="promptOutput" readonly></textarea>
                <button id="copyBtn" class="copy-btn">📋 Panoya Kopyala</button>
            </div>
        </div>
    </div>

    <script>
        const CORRECT_PASSWORD = "6314624";
        
        document.getElementById('loginBtn').addEventListener('click', function() {
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('passwordError');
            
            if (password === CORRECT_PASSWORD) {
                document.getElementById('passwordSection').classList.add('hidden');
                document.getElementById('mainSection').classList.remove('hidden');
                errorDiv.classList.add('hidden');
            } else {
                errorDiv.textContent = '❌ Yanlış şifre!';
                errorDiv.classList.remove('hidden');
            }
        });

        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });

        document.getElementById('fetchBtn').addEventListener('click', fetchData);
        document.getElementById('copyBtn').addEventListener('click', copyToClipboard);
        document.getElementById('username').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') fetchData();
        });

        async function fetchData() {
            const username = document.getElementById('username').value.trim();
            if (!username) {
                showMessage('Lütfen bir kullanıcı adı girin.', 'error');
                return;
            }

            document.getElementById('fetchBtn').disabled = true;
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('message').classList.add('hidden');
            document.getElementById('resultSection').classList.add('hidden');

            try {
                // Render'da da aynı domain üzerinden API'ye istek
                const response = await fetch(`/api/instagram/${encodeURIComponent(username)}`);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || `HTTP hatası ${response.status}`);
                }

                if (!data.success) {
                    throw new Error(data.error || 'Bilinmeyen hata');
                }

                const postsText = data.posts.length > 0 
                    ? data.posts.map(url => `  - ${url}`).join('\n')
                    : '  (Gönderi bulunamadı)';

                const prompt = `Aşağıdaki Instagram verilerini kullanarak, eksiksiz bir kurumsal web sitesi oluştur.

**İşletme Adı:** ${data.businessName}
**Profil Fotoğrafı URL:** ${data.profilePic}
**Bio / Açıklama:** ${data.bio}
**Gönderi Görselleri (URL listesi):** 
${postsText}

**Teknik Gereksinimler:**
- Node.js (Express) kullanarak bir uygulama oluştur.
- Profil fotoğrafını logo olarak kullan (header, favicon, vb.).
- Bio'daki adres, telefon, WhatsApp, e-posta gibi bilgileri tespit et ve iletişim bölümünde göster.
- Gönderi görsellerini responsive bir galeri olarak sergile (tıklanabilir, lightbox vb.).
- Logo görselinden renk paleti çıkar (Color Thief benzeri bir kütüphane kullan) ve site tasarımında bu renkleri uygula (butonlar, arkaplanlar, vurgular).
- SEO uyumlu: Başlık, meta açıklama, Open Graph etiketleri (profil fotoğrafı ve işletme adı ile).
- Responsive tasarım (mobil, tablet, masaüstü).
- Hata yönetimi: Eğer görsel URL'leri geçersizse veya yüklenemezse yer tutucu göster.
- Kodun tamamını ver: \`package.json\`, sunucu dosyası (\`app.js\`), statik dosyalar (CSS, JS). Çalıştırma talimatlarını ekle (\`npm install && node app.js\`).
`;

                document.getElementById('promptOutput').value = prompt;
                document.getElementById('resultSection').classList.remove('hidden');
                showMessage('✅ Veriler başarıyla çekildi!', 'success');

            } catch (error) {
                console.error(error);
                showMessage(`❌ Hata: ${error.message}`, 'error');
            } finally {
                document.getElementById('fetchBtn').disabled = false;
                document.getElementById('loading').classList.add('hidden');
            }
        }

        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = type === 'error' ? 'error-message' : 'success-message';
            msgDiv.classList.remove('hidden');
        }

        function copyToClipboard() {
            const promptText = document.getElementById('promptOutput').value;
            if (!promptText) return;
            navigator.clipboard.writeText(promptText).then(() => {
                const btn = document.getElementById('copyBtn');
                const orig = btn.textContent;
                btn.textContent = '✅ Kopyalandı!';
                setTimeout(() => btn.textContent = orig, 2000);
            });
        }
    </script>
</body>
</html>
